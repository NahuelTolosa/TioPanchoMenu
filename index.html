<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tío Pancho - Menú Digital</title>
        <link rel="icon" type="image/png" href="img/logo.png">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/styles.css">
    </head>
    <body>
        <header>
            <img src="img/logo.png" alt="Logo Tío Pancho" class="logo">
            <h1 id="header-title"></h1>
            <p id="header-subtitle"></p>
        </header>

        <nav class="nav-categories" id="nav-container">
        </nav>

        <main class="menu-container" id="menu-container">
        </main>

        <footer>
            <p><strong id="footer-title"></strong></p>
            <p id="footer-address"></p>
        </footer>

        <div id="product-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal" id="close-modal">&times;</span>
                <img id="modal-img" src="" alt="Producto real" onerror="this.style.display='none'">
                <h3 id="modal-title"></h3>
                <p id="modal-desc"></p>
                <!-- <button class="modal-btn" id="modal-close-btn">¡Lo quiero!</button> -->
            </div>
        </div>

        <script src="configs/data.js"></script>     
        <script src="js/header.js"></script>
        <script src="js/footer.js"></script>
        <script src="js/navegation.js"></script>
        <script src="js/modal.js"></script>
        <script src="js/productCards.js"></script>
        <script src="js/map.js"></script>

    </body>
</html>
